version: '3.8'

services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build: ./Backend
    ports:
      - "3030:3030"
    environment:
      - PORT=3030
      - MONGODB_URI=mongodb://mongo:27017/myurbanguide
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      args:
        - VITE_BACKEND_URL=http://localhost:3030/api/
        - VITE_UPLOAD_URL=http://localhost:3030/
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
