version: '3.8'

services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3030:3030"
    environment:
      - PORT=3030
      - MONGODB_URI=mongodb://mongo:27017/myurbanguide
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo-data:
